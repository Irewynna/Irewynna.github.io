<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Rachit's Link Hub</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#FDF0F5;--surface:#FFFAFB;--pink-50:#FFF0F7;--pink-100:#FFD6EA;--pink-200:#FFADD0;--pink-300:#F985B5;--pink-400:#E96FA3;--pink-500:#C94F82;--pink-deep:#8C2252;--blush:#F7CDE0;--text:#2A1520;--text2:#7A4060;--text3:#B389A0;--border:rgba(233,111,163,0.18);--border2:rgba(233,111,163,0.35);--glow:rgba(233,111,163,0.12)}html{scroll-behavior:smooth}body{font-family:'Jost',sans-serif;background:transparent;color:var(--text);min-height:100vh;overflow-x:hidden}#bg-layer{position:fixed;inset:0;background:var(--bg);z-index:0}#tree-canvas{position:fixed;inset:0;pointer-events:none;z-index:1}#petals{position:fixed;inset:0;pointer-events:none;z-index:150}#lights-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:200}.hero{position:relative;z-index:2;height:480px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3.5rem}.hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(253,220,236,0.1) 0%,rgba(253,224,238,0.42) 55%,rgba(253,236,245,0.93) 100%)}.hero-content{position:relative;z-index:2;text-align:center}.hero-eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--pink-500);font-weight:400;margin-bottom:14px}.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3.2rem,7vw,5.4rem);font-weight:300;color:var(--text);line-height:1;letter-spacing:-0.015em}.hero-title .accent{color:var(--pink-500);font-style:italic}#glyph-l{display:inline-block;transition:color .05s}.hero-sub{margin-top:12px;font-size:14px;color:var(--text2);font-weight:300;letter-spacing:.08em}.main{position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:0 1rem 6rem}.divider{text-align:center;margin:2.8rem 0 2rem;display:flex;align-items:center;gap:1rem;color:var(--pink-300)}.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--pink-200),transparent)}.filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:2.8rem}.pill{font-family:'Jost',sans-serif;font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;padding:7px 20px;border-radius:100px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .2s ease}.pill:hover{background:var(--pink-100);color:var(--pink-deep);border-color:var(--pink-300)}.pill.active{background:var(--pink-400);color:#fff;border-color:var(--pink-400)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}.card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:1.75rem 1.75rem 1.5rem;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;position:relative;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;color:inherit}.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--pink-200),var(--pink-400),var(--blush));border-radius:22px 22px 0 0}.card::after{content:'';position:absolute;bottom:-50px;right:-50px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,var(--pink-50) 60%,transparent 100%);opacity:.7;transition:transform .4s ease;pointer-events:none}.card:hover{transform:translateY(-5px);box-shadow:0 16px 48px var(--glow),0 4px 16px rgba(0,0,0,.04);border-color:var(--pink-200)}.card:hover::after{transform:scale(1.5)}.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:8px}.card-tag{font-size:9.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;background:var(--pink-100);color:var(--pink-deep);padding:4px 11px;border-radius:100px;border:1px solid var(--blush);flex-shrink:0}.card-arrow{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;transition:background .2s,color .2s,border-color .2s}.card:hover .card-arrow{background:var(--pink-400);color:#fff;border-color:var(--pink-400)}.card-body{flex:1}.card-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--text);line-height:1.15;margin-bottom:9px}.card-desc{font-size:13px;color:var(--text2);line-height:1.65;font-weight:300;margin-bottom:18px}.card-footer{display:flex;align-items:center;gap:6px;margin-top:auto}.card-url{font-size:11px;color:var(--text3);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-dot{width:4px;height:4px;border-radius:50%;background:var(--pink-200);flex-shrink:0}.apk-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:6px 14px;border-radius:100px;border:1px solid var(--border2);background:var(--pink-50);color:var(--pink-deep);font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.06em;text-decoration:none;transition:background .2s,border-color .2s;z-index:10;position:relative}.apk-btn:hover{background:var(--pink-100);border-color:var(--pink-300)}.apk-btn svg{flex-shrink:0}.empty{grid-column:1/-1;text-align:center;padding:5rem 2rem}.empty-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:var(--text2);margin-bottom:12px}.empty-hint{font-size:13px;color:var(--text3);line-height:1.8}.empty-hint code{background:var(--pink-100);color:var(--pink-deep);padding:2px 8px;border-radius:5px;font-size:12px;font-family:'Courier New',monospace;border:1px solid var(--blush)}.footer{position:relative;z-index:2;text-align:center;padding:2.5rem 1rem 3rem;font-size:11px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}.footer span{color:var(--pink-400);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;letter-spacing:0;text-transform:none}</style></head><body><div id="bg-layer"></div><canvas id="tree-canvas"></canvas><canvas id="petals"></canvas><canvas id="lights-canvas"></canvas><header class="hero"><div class="hero-overlay"></div><div class="hero-content"><p class="hero-eyebrow">NOT so personal workspace now, is it!?</p><h1 class="hero-title">Rachit's <span class="accent"><span id="glyph-l">L</span>ink Hub</span></h1><p class="hero-sub">All of my projects in one place</p></div></header><main class="main"><div class="divider"><span>&#10047;</span></div><div class="filter-bar" id="filter-bar"><button class="pill active" data-tag="all">All</button></div><div class="grid" id="grid"></div></main><footer class="footer">Made by &nbsp;<span>Rachit</span>&nbsp; · built with ♥</footer><script>const links=[{title:"StreamSalut",url:"https://streamsalut.netlify.app",desc:"Stream TV shows and movies for free!",tag:"Streaming"},{title:"Melodix",url:"https://musics4me.netlify.app",desc:"Stream music for free! (library is mine)",tag:"Streaming"},{title:"Anon Whisper",url:"https://anonwhisper.netlify.app",desc:"Chat with strangers anonymously, or don't!",tag:"Social Media",apk:"anonwhisper.apk"},{title:"Taylor Swift Lyric Explorer",url:"https://taysearch.netlify.app",desc:"Search Taylor Swift's songs by lyrics",tag:"Lifestyle"},{title:"Reform India Blog",url:"https://RachitMaheshwariBlog.github.io",desc:"Personal blog about reforms in India",tag:"Blog"},{title:"ORS",url:"https://orsform.netlify.app",desc:"Optical Response Sheet with max 150 questions",tag:"Lifestyle"},{title:"Whatsapp Chat Backup Viewer",url:"https://chatbackupview.netlify.app",desc:"View Whatsapp chat backups as if on WhatsApp!",tag:"Lifestyle"},/* Secret website for sneaky bastards snooping around in my source code {title:"Word Frequency Analysis",url:"https://wordfrequencyanalysis.netlify.app",desc:"Analysis of the frequency and relations of words in my diary",tag:"Lifestyle"} */];const ARROW=`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H5M10 2V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;const DL=`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v6M3.5 6l2.5 2.5L8.5 6M2 10h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function domainOf(u){try{return new URL(u).hostname.replace(/^www\./,'');}catch{return u;}}function renderCards(list){const g=document.getElementById('grid');if(!list.length){g.innerHTML=`<div class="empty"><p class="empty-title">Nothing here yet…</p><p class="empty-hint">Open this file and add entries to the <code>links</code> array.</p></div>`;return;}g.innerHTML=list.map(l=>`<div class="card" data-url="${l.url}"><div class="card-header"><span class="card-tag">${l.tag}</span><span class="card-arrow" aria-hidden="true">${ARROW}</span></div><div class="card-body"><div class="card-title">${l.title}</div>${l.desc?`<div class="card-desc">${l.desc}</div>`:''}</div><div class="card-footer"><span class="card-dot"></span><span class="card-url">${domainOf(l.url)}</span></div>${l.apk?`<a class="apk-btn" href="${l.apk}" download onclick="event.stopPropagation()">${DL} Download as .apk (Android only)</a>`:''}</div>`).join('');g.querySelectorAll('.card').forEach(c=>c.addEventListener('click',e=>{if(e.target.closest('.apk-btn'))return;window.open(c.dataset.url,'_blank','noopener,noreferrer');}));}function setFilter(tag,el){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));if(el)el.classList.add('active');renderCards(tag==='all'?links:links.filter(l=>l.tag===tag));}

(function(){const bar=document.getElementById('filter-bar');const allBtn=bar.querySelector('[data-tag="all"]');allBtn.addEventListener('click',function(){setFilter('all',this);});[...new Set(links.map(l=>l.tag))].forEach(tag=>{const btn=document.createElement('button');btn.className='pill';btn.dataset.tag=tag;btn.textContent=tag;btn.addEventListener('click',function(){setFilter(tag,this);});bar.appendChild(btn);});setFilter('all',allBtn);})();(function(){const cv=document.getElementById('tree-canvas');const cx=cv.getContext('2d');const BLOSSOM_COLS=['rgba(255,180,214,0.52)','rgba(255,210,232,0.58)','rgba(251,148,196,0.42)','rgba(255,240,250,0.62)','rgba(244,170,210,0.48)','rgba(255,198,228,0.55)'];function flower(x,y,r){for(let p=0;p<5;p++){const a=(p/5)*Math.PI*2-Math.PI*0.5;cx.beginPath();cx.ellipse(x+Math.cos(a)*r*.65,y+Math.sin(a)*r*.65,r*.55,r*.38,a,0,Math.PI*2);cx.fillStyle=BLOSSOM_COLS[Math.floor(Math.random()*BLOSSOM_COLS.length)];cx.fill();}cx.beginPath();cx.arc(x,y,r*.22,0,Math.PI*2);cx.fillStyle='rgba(255,218,170,0.72)';cx.fill();}function cloud(x,y,r){const n=5+Math.floor(Math.random()*7);for(let i=0;i<n;i++){const dx=(Math.random()-.5)*r*4,dy=(Math.random()-.5)*r*4;const s=r*(.4+Math.random()*.7);if(Math.random()>.55)flower(x+dx,y+dy,s);else{cx.beginPath();cx.arc(x+dx,y+dy,s,0,Math.PI*2);cx.fillStyle=BLOSSOM_COLS[Math.floor(Math.random()*BLOSSOM_COLS.length)];cx.fill();}}}function branch(x,y,angle,len,w,depth){if(depth<1||len<6){cloud(x,y,4+Math.random()*10);return;}const x2=x+Math.cos(angle)*len,y2=y+Math.sin(angle)*len;cx.beginPath();cx.moveTo(x,y);cx.lineTo(x2,y2);cx.lineWidth=Math.max(.7,w);cx.strokeStyle=`rgba(62,25,36,${Math.min(.72,.1+depth*.075)})`;cx.lineCap='round';cx.stroke();const j=()=>(Math.random()-.5)*.2;const spl=.26+Math.random()*.16;branch(x2,y2,angle-spl+j(),len*(.67+Math.random()*.07),w*.62,depth-1);branch(x2,y2,angle+spl*.88+j(),len*(.63+Math.random()*.07),w*.58,depth-1);if(depth>4&&Math.random()>.48)branch(x2,y2,angle+(Math.random()-.5)*.55,len*.5,w*.44,depth-2);if(depth===3&&Math.random()>.6)cloud(x2,y2,6+Math.random()*8);}function draw(){cv.width=window.innerWidth;cv.height=window.innerHeight;cx.clearRect(0,0,cv.width,cv.height);const bx=cv.width*.5,by=cv.height+15;const th=cv.height*.66,tx=bx-10,ty=by-th;cx.beginPath();cx.moveTo(bx-12,by);cx.bezierCurveTo(bx-10,by-th*.45,bx-13,by-th*.8,tx-2,ty);cx.bezierCurveTo(tx+10,by-th*.8,bx+8,by-th*.45,bx+12,by);cx.fillStyle='rgba(62,25,36,.28)';cx.fill();const UP=-Math.PI/2;branch(tx,ty,UP,th*.52,5.5,9);branch(tx,ty,UP-.52,th*.45,4.5,8);branch(tx,ty,UP+.47,th*.43,4.5,8);branch(bx-4,by-th*.65,UP-1.02,th*.30,3.2,7);branch(bx+2,by-th*.60,UP+.97,th*.28,3.0,7);branch(bx-3,by-th*.82,UP-.68,th*.22,2.4,6);branch(bx+5,by-th*.78,UP+.75,th*.20,2.2,6);}draw();window.addEventListener('resize',draw);})();

var _lightsBulbs=[];var _lightsDrawFrame=null;(function(){const cv=document.getElementById('lights-canvas');const cx=cv.getContext('2d');const CVH=152;const AY=14;let W=0;function qB(t,x0,y0,cpx,cpy,x1,y1){const m=1-t;return{x:m*m*x0+2*m*t*cpx+t*t*x1,y:m*m*y0+2*m*t*cpy+t*t*y1};}function mainCP(){return{x:W/2,y:110};}function mainPt(t){const cp=mainCP();return qB(t,0,AY,cp.x,cp.y,W,AY);}function buildLayout(){W=cv.width=window.innerWidth;cv.height=CVH;_lightsBulbs=[];const N=20;for(let i=0;i<N;i++){const t=0.025+i*(0.95/(N-1));const p=mainPt(t);_lightsBulbs.push({x:p.x,y:p.y,br:0});}}function seg(x0,y0,cpx,cpy,x1,y1,lw,alpha){cx.beginPath();cx.moveTo(x0,y0);cx.quadraticCurveTo(cpx,cpy,x1,y1);cx.strokeStyle=`rgba(100,72,48,${alpha})`;cx.lineWidth=lw;cx.lineCap='round';cx.stroke();}function drawFrame(){cx.clearRect(0,0,W,CVH);const cp=mainCP();const lA=mainPt(0.20);const lM=mainPt(0.50);const rA=mainPt(0.80);const lCPy=196;seg(lA.x,lA.y,W*0.35,lCPy,lM.x,lM.y,1.15,0.38);seg(lM.x,lM.y,W*0.65,lCPy,rA.x,rA.y,1.15,0.38);cx.fillStyle='rgba(72,50,32,.82)';cx.fillRect(-1,AY-5,6,9);cx.fillRect(W-5,AY-5,6,9);seg(0,AY,cp.x,cp.y,W,AY,1.45,0.70);_lightsBulbs.forEach(b=>{if(b.br>0.12){const gr=cx.createRadialGradient(b.x,b.y+13,0,b.x,b.y+13,28);gr.addColorStop(0,`rgba(255,252,210,${b.br*0.44})`);gr.addColorStop(0.5,`rgba(255,248,185,${b.br*0.19})`);gr.addColorStop(1,'rgba(255,248,185,0)');cx.fillStyle=gr;cx.beginPath();cx.arc(b.x,b.y+13,28,0,Math.PI*2);cx.fill();}cx.fillStyle='rgba(70,46,28,.92)';cx.beginPath();cx.roundRect(b.x-3,b.y,6,7,1);cx.fill();cx.beginPath();cx.ellipse(b.x,b.y+17,5.6,8.8,0,0,Math.PI*2);cx.fillStyle=b.br>0?`rgba(255,253,224,${0.48+b.br*0.52})`:'rgba(185,168,148,0.40)';cx.fill();cx.strokeStyle=b.br>0?`rgba(200,162,85,${0.22+b.br*0.32})`:'rgba(125,105,85,0.25)';cx.lineWidth=0.65;cx.stroke();if(b.br>0.45){cx.beginPath();cx.ellipse(b.x-2,b.y+12.5,1.6,2.6,-0.35,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${b.br*0.50})`;cx.fill();}});}_lightsDrawFrame=drawFrame;let phase='wait',t0=Date.now();function loop(){const el=Date.now()-t0;if(phase==='wait'){_lightsBulbs.forEach(b=>b.br=0);drawFrame();if(el>500){phase='flicker';t0=Date.now();}requestAnimationFrame(loop);}else if(phase==='flicker'){const prog=Math.min(1,el/2000);_lightsBulbs.forEach(b=>{b.br=Math.random()>(0.55-prog*0.3)?Math.random()*(0.5+prog*0.5):0;});drawFrame();if(el>2300){phase='fadein';t0=Date.now();}requestAnimationFrame(loop);}else if(phase==='fadein'){const p=Math.min(1,el/500);_lightsBulbs.forEach(b=>b.br=p);drawFrame();if(p>=1){phase='on';scheduleSubtle();}else requestAnimationFrame(loop);}}function scheduleSubtle(){setTimeout(()=>{let i=0;const id=setInterval(()=>{_lightsBulbs.forEach(b=>{b.br=Math.random()>0.3?0.65+Math.random()*0.35:0.05+Math.random()*0.2;});drawFrame();i++;if(i>14){clearInterval(id);_lightsBulbs.forEach(b=>b.br=1);drawFrame();scheduleSubtle();}},75);},9000+Math.random()*14000);}window._triggerLightFlicker=function(){let i=0;const id=setInterval(()=>{_lightsBulbs.forEach(b=>{b.br=Math.random()>0.42?Math.random():0;});drawFrame();i++;if(i>12){clearInterval(id);_lightsBulbs.forEach(b=>b.br=1);drawFrame();}},68);};window.addEventListener('resize',()=>{buildLayout();drawFrame();});buildLayout();loop();})();

(function(){const cv=document.getElementById('petals');const cx=cv.getContext('2d');let W,H,petals=[];let mX=-999,mY=-999,windX=0,windY=0;let prevX=0,prevY=0,lastMove=0;document.addEventListener('mousemove',e=>{windX=(e.clientX-prevX)*.38;windY=(e.clientY-prevY)*.20;mX=e.clientX;mY=e.clientY;prevX=e.clientX;prevY=e.clientY;lastMove=Date.now();});const COLS=['rgba(255,180,212,0.74)','rgba(255,218,236,0.80)','rgba(250,132,186,0.58)','rgba(255,245,252,0.84)','rgba(255,160,200,0.64)','rgba(243,186,220,0.70)'];function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}function makePetal(startY){const bvx=(Math.random()-.5)*.95,bvy=.78+Math.random()*1.1;return{x:Math.random()*W,y:startY!==undefined?startY:-20,rx:5.5+Math.random()*6,ry:2.5+Math.random()*3,rot:Math.random()*Math.PI*2,dRot:(Math.random()-.5)*.047,vx:bvx,vy:bvy,bvx,bvy,sway:Math.random()*Math.PI*2,dSway:.012+Math.random()*.018,col:COLS[Math.floor(Math.random()*COLS.length)],};}function tick(){cx.clearRect(0,0,W,H);if(Date.now()-lastMove>60){windX*=.88;windY*=.88;}if(Math.random()<.28&&petals.length<90)petals.push(makePetal());petals.forEach(p=>{const dx=p.x-mX,dy=p.y-mY;const dist=Math.sqrt(dx*dx+dy*dy);const R=280;const prox=dist<R?(1-dist/R):0;const boost=1+prox*2.8;p.vx+=windX*.022*boost;p.vy+=windY*.012*boost;p.vx+=(p.bvx-p.vx)*.024;p.vy+=(p.bvy-p.vy)*.024;p.vx=Math.max(-9,Math.min(9,p.vx));p.vy=Math.max(-2.5,Math.min(9,p.vy));p.sway+=p.dSway;p.x+=p.vx+Math.sin(p.sway)*.55;p.y+=p.vy;p.rot+=p.dRot;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.beginPath();cx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);cx.fillStyle=p.col;cx.fill();cx.restore();});petals=petals.filter(p=>p.y<H+32&&p.x>-55&&p.x<W+55);requestAnimationFrame(tick);}resize();for(let i=0;i<40;i++)petals.push(makePetal(Math.random()*H));tick();window.addEventListener('resize',resize);})();

(function(){const el=document.getElementById('glyph-l');if(!el)return;function doGlitch(){if(window._triggerLightFlicker)window._triggerLightFlicker();const preSeq=['L','P','L','P','L','L','P','L','P'];const postSeq=['P','L','P','L','P','L','L','P','L'];let i=0;const flkIn=setInterval(()=>{el.textContent=preSeq[i%preSeq.length];el.style.opacity=Math.random()>.42?'1':'0.12';i++;if(i>=preSeq.length+5){clearInterval(flkIn);el.textContent='P';el.style.opacity='1';el.style.color='var(--pink-300)';const hold=2200+Math.random()*2600;setTimeout(()=>{let j=0;const flkOut=setInterval(()=>{el.textContent=postSeq[j%postSeq.length];el.style.opacity=Math.random()>.38?'1':'0.1';j++;if(j>=postSeq.length+5){clearInterval(flkOut);el.textContent='L';el.style.opacity='1';el.style.color='';setTimeout(doGlitch,16000+Math.random()*18000);}},68);},hold);}},72);}setTimeout(doGlitch,7000+Math.random()*7000);})();</script></body></html>
